<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>دعوة فرح شريف وفاطمة</title>

  <style>

    body {

      margin: 0;

      font-family: "Tahoma", sans-serif;

      background: #fff8f0;

      text-align: center;

      color: #5a3a2e;

    }

    .card {

      min-height: 100vh;

      padding: 40px 20px;

      display: flex;

      flex-direction: column;

      justify-content: center;

      align-items: center;

    }

    h1 {

      font-size: 45px;

      margin-bottom: 10px;

    }

    h2 {

      font-size: 28px;

      font-weight: normal;

    }

    .info {

      background: rgba(255,255,255,0.8);

      padding: 25px;

      border-radius: 20px;

      margin-top: 25px;

      width: 85%;

      max-width: 450px;

    }

    .info p {

      font-size: 20px;

      line-height: 2;

    }

    .btn {

      display: inline-block;

      margin-top: 20px;

      padding: 12px 30px;

      background: #b8865b;

      color: white;

      text-decoration: none;

      border-radius: 30px;

      font-size: 18px;

    }

  </style>

</head>

<body>

<div class="card">

  <h2>بسم الله الرحمن الرحيم</h2>

  <h1>Sherif ❤️ Fatma</h1>

  <h2>يسعدنا تشريفكم بحضور حفل زفافنا</h2>

  <div class="info">

    <p>

      📅 التاريخ: 28 / 8 / 2026

    </p>

    <p>

      🕢 الساعة: 7:30 مساءً

    </p>

    <p>

      📍 القاعة: قاعة الروضة

    </p>

  </div>

</div>

</body>
<!-- Countdown -->

<div class="info">

  <h2>باقي على الفرح ❤️</h2>

  <div id="countdown" style="font-size:25px; font-weight:bold;"></div>

</div>

<script>

const weddingDate = new Date("August 28, 2026 19:30:00").getTime();

const timer = setInterval(function(){

  const now = new Date().getTime();

  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));

  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =

  days + " يوم ❤️ " +

  hours + " ساعة ❤️ " +

  minutes + " دقيقة ❤️ " +

  seconds + " ثانية";

  if(distance < 0){

    clearInterval(timer);

    document.getElementById("countdown").innerHTML = "اليوم فرحنا ❤️";

  }

},1000);

</script>
