<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>دعوة فرح شريف وفاطمة</title>

  <style>

      
<style>

*{

  box-sizing:border-box;

}

body{

  margin:0;

  font-family:"Tahoma", sans-serif;

  background:

  linear-gradient(rgba(255,245,235,.85),rgba(255,245,235,.85)),

  url("https://images.unsplash.com/photo-1519225421980-715cb0215aed");

  background-size:cover;

  background-position:center;

  color:#6b4936;

}

.card{

  min-height:100vh;

  padding:40px 20px;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

}

.card h2{

  font-size:25px;

  animation:fade 2s;

}

.card h1{

  font-size:55px;

  color:#b8865b;

  font-family:serif;

  margin:20px;

  animation:fade 2s;

}

.info{

  background:rgba(255,255,255,.85);

  border:2px solid #d4af73;

  border-radius:30px;

  padding:30px;

  width:90%;

  max-width:500px;

  box-shadow:0 10px 30px rgba(0,0,0,.15);

  animation:up 2s;

}

.info p{

  font-size:21px;

  line-height:2;

}

.btn{

  display:inline-block;

  margin:15px;

  padding:15px 35px;

  background:#b8865b;

  color:white;

  text-decoration:none;

  border-radius:40px;

  font-size:18px;

  border:none;

}

#countdown{

  font-size:24px !important;

  color:#b8865b;

}

@keyframes fade{

  from{

    opacity:0;

  }

  to{

    opacity:1;

  }

}

@keyframes up{

  from{

    transform:translateY(40px);

    opacity:0;

  }

  to{

    transform:translateY(0);

    opacity:1;

  }

}

</style>
      

  </style>

</head>

<body>

<div class="card">

  <h2>بسم الله الرحمن الرحيم</h2>

  <h1>Sherif ❤️ Fatma</h1>

  <h2>يسعدنا تشريفكم بحضور حفل زفافنا</h2>

  <div class="info">

    <p>

      📅 التاريخ: 28 / 8 / 2026

    </p>

    <p>

      🕢 الساعة: 7:30 مساءً

    </p>

    <p>

      📍 القاعة: قاعة الروضة

    </p>

  </div>

</div>
<!-- Countdown -->

<div class="info">

  <h2>باقي على الفرح ❤️</h2>

  <div id="countdown" style="font-size:25px; font-weight:bold;"></div>

</div>

<script>

const weddingDate = new Date("August 28, 2026 19:30:00").getTime();

const timer = setInterval(function(){

  const now = new Date().getTime();

  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));

  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =

  days + " يوم ❤️ " +

  hours + " ساعة ❤️ " +

  minutes + " دقيقة ❤️ " +

  seconds + " ثانية";

  if(distance < 0){

    clearInterval(timer);

    document.getElementById("countdown").innerHTML = "اليوم فرحنا ❤️";

  }

},1000);

</script>
</body>

</html>
